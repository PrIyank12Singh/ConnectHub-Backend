# ================================================================
# application.properties  —  websocket-handler
# ================================================================
spring.application.name=websocket-handler
spring.profiles.active=dev

# ----- Eureka Client -----
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ----- Server -----
server.port=8087

# ----- JWT Secret (must match auth-service) -----
auth.jwt.secret=${AUTH_JWT_SECRET:connecthub-dev-secret-key-change-me-please-32bytes}

# ----- SpringDoc -----
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ----- Internal service URLs -----
message.service.url=${MESSAGE_SERVICE_URL:http://localhost:8083}
presence.service.url=${PRESENCE_SERVICE_URL:http://localhost:8085}
notification.service.url=${NOTIFICATION_SERVICE_URL:http://localhost:8086}
room.service.url=${ROOM_SERVICE_URL:http://localhost:8082}

# ----- STOMP Heartbeat (ms) -----
stomp.heartbeat.send=10000
stomp.heartbeat.receive=10000

# ----- WebSocket Inbound Channel Thread Pool -----
# FIX: prevents "Failed to send message to ExecutorSubscribableChannel[clientInboundChannel]"
# Default Spring pool is too small (1-4 threads) for concurrent STOMP traffic.
stomp.inbound.core-pool-size=8
stomp.inbound.max-pool-size=16
stomp.inbound.queue-capacity=200

# ----- Allowed CORS origins -----
cors.allowed.origins=${CORS_ORIGINS:http://localhost:4200}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
