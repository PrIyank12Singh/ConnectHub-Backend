# Production Profile — MySQL Database
spring.datasource.url=${AUTH_DB_URL:jdbc:mysql://localhost:3306/connecthub_auth}
spring.datasource.username=${AUTH_DB_USERNAME:root}
spring.datasource.password=${AUTH_DB_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Performance & Logging
logging.level.org.hibernate.orm.jdbc.bind=WARN
