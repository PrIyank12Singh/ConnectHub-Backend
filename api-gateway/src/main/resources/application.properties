# ================================================================
# application.properties  —  api-gateway
# ================================================================
spring.application.name=api-gateway

# ----- Eureka Client -----
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ----- Server -----
server.port=8080

# ----- JWT Secret -----
auth.jwt.secret=${AUTH_JWT_SECRET:connecthub-dev-secret-key-change-me-please-32bytes}

# ================================================================
# Spring Cloud Gateway Routes
# ================================================================

# ── connecthub-web — port 8088 ──────────────────────────────────
spring.cloud.gateway.routes[0].id=connecthub-web-public
spring.cloud.gateway.routes[0].uri=http://localhost:8088
spring.cloud.gateway.routes[0].predicates[0]=Path=/web/auth/register,/web/auth/login,/web/auth/refresh

spring.cloud.gateway.routes[1].id=connecthub-web
spring.cloud.gateway.routes[1].uri=http://localhost:8088
spring.cloud.gateway.routes[1].predicates[0]=Path=/web/**
spring.cloud.gateway.routes[1].filters[0]=JwtAuthFilter

# ── auth-service — port 8081 ────────────────────────────────────
spring.cloud.gateway.routes[2].id=auth-service-public
spring.cloud.gateway.routes[2].uri=http://localhost:8081
spring.cloud.gateway.routes[2].predicates[0]=Path=/auth/register,/auth/login,/auth/refresh,/auth/validate

spring.cloud.gateway.routes[3].id=auth-service-protected
spring.cloud.gateway.routes[3].uri=http://localhost:8081
spring.cloud.gateway.routes[3].predicates[0]=Path=/auth/**
spring.cloud.gateway.routes[3].filters[0]=JwtAuthFilter

# ── room-service — port 8082 ────────────────────────────────────
spring.cloud.gateway.routes[4].id=room-service
spring.cloud.gateway.routes[4].uri=http://localhost:8082
spring.cloud.gateway.routes[4].predicates[0]=Path=/rooms/**
spring.cloud.gateway.routes[4].filters[0]=JwtAuthFilter

# ── message-service — port 8083 ─────────────────────────────────
spring.cloud.gateway.routes[5].id=message-service
spring.cloud.gateway.routes[5].uri=http://localhost:8083
spring.cloud.gateway.routes[5].predicates[0]=Path=/messages/**
spring.cloud.gateway.routes[5].filters[0]=JwtAuthFilter

# ── media-service public file serving ───────────────────────────
spring.cloud.gateway.routes[6].id=media-files-public
spring.cloud.gateway.routes[6].uri=http://localhost:8084
spring.cloud.gateway.routes[6].predicates[0]=Path=/media/files/**,/media/thumbnails/**

# ── media-service protected ─────────────────────────────────────
spring.cloud.gateway.routes[7].id=media-service
spring.cloud.gateway.routes[7].uri=http://localhost:8084
spring.cloud.gateway.routes[7].predicates[0]=Path=/media/**
spring.cloud.gateway.routes[7].filters[0]=JwtAuthFilter

# ── presence-service — port 8085 ────────────────────────────────
spring.cloud.gateway.routes[8].id=presence-service
spring.cloud.gateway.routes[8].uri=http://localhost:8085
spring.cloud.gateway.routes[8].predicates[0]=Path=/presence/**
spring.cloud.gateway.routes[8].filters[0]=JwtAuthFilter

# ── notification-service — port 8086 ────────────────────────────
spring.cloud.gateway.routes[9].id=notification-service
spring.cloud.gateway.routes[9].uri=http://localhost:8086
spring.cloud.gateway.routes[9].predicates[0]=Path=/notifications/**
spring.cloud.gateway.routes[9].filters[0]=JwtAuthFilter

# ── websocket-handler — port 8087 ───────────────────────────────
spring.cloud.gateway.routes[10].id=websocket-handler
spring.cloud.gateway.routes[10].uri=ws://localhost:8087
spring.cloud.gateway.routes[10].predicates[0]=Path=/ws/**

# ── API Docs per service (no JWT — Swagger must be public) ───────
spring.cloud.gateway.routes[11].id=api-docs-auth
spring.cloud.gateway.routes[11].uri=http://localhost:8081
spring.cloud.gateway.routes[11].predicates[0]=Path=/auth-service/v3/api-docs
spring.cloud.gateway.routes[11].filters[0]=RewritePath=/auth-service/v3/api-docs, /v3/api-docs

spring.cloud.gateway.routes[12].id=api-docs-media
spring.cloud.gateway.routes[12].uri=http://localhost:8084
spring.cloud.gateway.routes[12].predicates[0]=Path=/media-service/v3/api-docs
spring.cloud.gateway.routes[12].filters[0]=RewritePath=/media-service/v3/api-docs, /v3/api-docs

spring.cloud.gateway.routes[13].id=api-docs-room
spring.cloud.gateway.routes[13].uri=http://localhost:8082
spring.cloud.gateway.routes[13].predicates[0]=Path=/room-service/v3/api-docs
spring.cloud.gateway.routes[13].filters[0]=RewritePath=/room-service/v3/api-docs, /v3/api-docs

spring.cloud.gateway.routes[14].id=api-docs-message
spring.cloud.gateway.routes[14].uri=http://localhost:8083
spring.cloud.gateway.routes[14].predicates[0]=Path=/message-service/v3/api-docs
spring.cloud.gateway.routes[14].filters[0]=RewritePath=/message-service/v3/api-docs, /v3/api-docs

spring.cloud.gateway.routes[15].id=api-docs-presence
spring.cloud.gateway.routes[15].uri=http://localhost:8085
spring.cloud.gateway.routes[15].predicates[0]=Path=/presence-service/v3/api-docs
spring.cloud.gateway.routes[15].filters[0]=RewritePath=/presence-service/v3/api-docs, /v3/api-docs

spring.cloud.gateway.routes[16].id=api-docs-notification
spring.cloud.gateway.routes[16].uri=http://localhost:8086
spring.cloud.gateway.routes[16].predicates[0]=Path=/notification-service/v3/api-docs
spring.cloud.gateway.routes[16].filters[0]=RewritePath=/notification-service/v3/api-docs, /v3/api-docs

# ================================================================
# Swagger Aggregation
# ================================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config

# ⬇ ADD THIS — disables the gateway's own empty API doc listing
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

springdoc.swagger-ui.urls[0].url=/auth-service/v3/api-docs
springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[1].url=/media-service/v3/api-docs
springdoc.swagger-ui.urls[1].name=Media Service
springdoc.swagger-ui.urls[2].url=/room-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=Room Service
springdoc.swagger-ui.urls[3].url=/message-service/v3/api-docs
springdoc.swagger-ui.urls[3].name=Message Service
springdoc.swagger-ui.urls[4].url=/presence-service/v3/api-docs
springdoc.swagger-ui.urls[4].name=Presence Service
springdoc.swagger-ui.urls[5].url=/notification-service/v3/api-docs
springdoc.swagger-ui.urls[5].name=Notification Service

# ================================================================
# Global CORS
# ================================================================
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=http://localhost:4200,http://localhost:8080
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowCredentials=true

# ----- Logging -----
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.com.connecthub.api_gateway=DEBUG

# ----- Actuator -----
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always