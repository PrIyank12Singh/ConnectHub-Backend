# ─────────────────────────────────────────────────────────────────────────────
# SonarQube Project Configuration — ConnectHub :: API Gateway
# Place this file at: api-gateway/sonar-project.properties
# ─────────────────────────────────────────────────────────────────────────────

# Project identification
sonar.projectKey=com.connecthub:api-gateway
sonar.projectName=ConnectHub :: API Gateway
sonar.projectVersion=1.0

# Source and test paths
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# Encoding
sonar.sourceEncoding=UTF-8

# JaCoCo coverage report — generated by mvn verify
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Exclude filter/config classes — gateway logic is mostly routing config
# which doesn't benefit from unit test coverage metrics
sonar.exclusions=\
  **/config/**,\
  **/filter/**,\
  **/*Application.java

# Exclude test files from duplicate detection
sonar.cpd.exclusions=src/test/**

# Language
sonar.language=java
sonar.java.source=17
