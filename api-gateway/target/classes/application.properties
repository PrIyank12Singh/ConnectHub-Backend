# ================================================================
# application.properties  —  api-gateway
# ================================================================
spring.application.name=api-gateway

# ----- Server -----
server.port=8080

# ----- JWT Secret (must match auth-service) -----
auth.jwt.secret=${AUTH_JWT_SECRET:connecthub-dev-secret-key-change-me-please-32bytes}

# ----- Logging -----
logging.level.org.springframework.cloud.gateway=INFO
logging.level.com.ConnectHub.api_gateway=INFO

# ----- Disable default Spring Security login page -----
spring.security.enabled=false
