# ================================================================
# application.properties  —  eureka-service
# ConnectHub Service Discovery (Netflix Eureka Server)
# ================================================================
spring.application.name=eureka-service

# ----- Server -----
server.port=8761

# ----------------------------------------------------------------
# Eureka Server config
# standalone mode — this instance does NOT register with itself
# and does NOT fetch the registry from another peer         
# ----------------------------------------------------------------
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

eureka.server.enable-self-preservation=false
eureka.server.eviction-interval-timer-in-ms=5000

eureka.instance.hostname=localhost
eureka.client.service-url.defaultZone=http://${eureka.instance.hostname}:${server.port}/eureka/

# ----------------------------------------------------------------
# Actuator — expose health endpoint for monitoring
# ----------------------------------------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ----------------------------------------------------------------
# Logging
# ----------------------------------------------------------------
logging.level.com.netflix.eureka=WARN
logging.level.com.netflix.discovery=WARN
logging.level.com.ConnectHub.eureka_service=INFO
