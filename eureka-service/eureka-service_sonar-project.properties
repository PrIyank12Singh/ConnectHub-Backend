# ─────────────────────────────────────────────────────────────────────────────
# SonarQube Project Configuration — ConnectHub :: Eureka Service
# Place this file at: eureka-service/sonar-project.properties
# ─────────────────────────────────────────────────────────────────────────────

# Project identification
sonar.projectKey=com.connecthub:eureka-service
sonar.projectName=ConnectHub :: Eureka Service
sonar.projectVersion=1.0

# Source and test paths
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# Encoding
sonar.sourceEncoding=UTF-8

# JaCoCo coverage report — generated by mvn verify
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Eureka service is almost entirely bootstrap/config — exclude the app entry point
# Low coverage expected here; this is infrastructure, not business logic
sonar.exclusions=\
  **/*Application.java,\
  **/config/**

# Exclude test files from duplicate detection
sonar.cpd.exclusions=src/test/**

# Language
sonar.language=java
sonar.java.source=17
