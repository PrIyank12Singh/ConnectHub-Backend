# ================================================================
# application.properties  —  connecthub-web (MVC Layer)
# Port: 8088  (Gateway routes /web/** → http://localhost:8088)
# ================================================================
spring.application.name=connecthub-web

# ----- Eureka Client -----
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ----- Server -----
server.port=8088

# ----- JWT Secret (must match auth-service & api-gateway) -----
auth.jwt.secret=${AUTH_JWT_SECRET:connecthub-dev-secret-key-change-me-please-32bytes}

# ----- SpringDoc -----
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ----- Downstream service base URLs -----
service.auth.url=${AUTH_SERVICE_URL:http://localhost:8081}
service.room.url=${ROOM_SERVICE_URL:http://localhost:8082}
service.message.url=${MESSAGE_SERVICE_URL:http://localhost:8083}
service.media.url=${MEDIA_SERVICE_URL:http://localhost:8084}
service.presence.url=${PRESENCE_SERVICE_URL:http://localhost:8085}
service.notification.url=${NOTIFICATION_SERVICE_URL:http://localhost:8086}
service.websocket.url=${WEBSOCKET_SERVICE_URL:http://localhost:8087}

# ----- CORS (Angular SPA on 4200) -----
web.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}

# ----- Logging -----
logging.level.com.ConnectHub.connecthub_web=INFO
logging.level.org.springframework.web=INFO

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
