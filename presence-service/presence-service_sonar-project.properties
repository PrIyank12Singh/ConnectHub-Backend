# ─────────────────────────────────────────────────────────────────────────────
# SonarQube Project Configuration — ConnectHub :: Presence Service
# Place this file at: presence-service/sonar-project.properties
# ─────────────────────────────────────────────────────────────────────────────

# Project identification
sonar.projectKey=com.connecthub:presence-service
sonar.projectName=ConnectHub :: Presence Service
sonar.projectVersion=1.0

# Source and test paths
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# Encoding
sonar.sourceEncoding=UTF-8

# JaCoCo coverage report — generated by mvn verify
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Exclude generated/config classes from analysis
sonar.exclusions=\
  **/config/**,\
  **/*Application.java,\
  **/dto/**,\
  **/model/**,\
  **/exception/GlobalExceptionHandler.java

# Exclude test files from duplicate detection
sonar.cpd.exclusions=src/test/**

# Language
sonar.language=java
sonar.java.source=17
