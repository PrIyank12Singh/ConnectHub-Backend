# ================================================================
# application.properties  —  presence-service
# ================================================================
spring.application.name=presence-service
spring.profiles.active=dev

# ----- Eureka Client -----
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ----- MySQL -----
spring.datasource.url=${PRESENCE_DB_URL:jdbc:mysql://localhost:3306/connecthub_presence?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${PRESENCE_DB_USERNAME:root}
spring.datasource.password=${PRESENCE_DB_PASSWORD:P_22@LovePUBG}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ----- JWT Secret (must match auth-service) -----
auth.jwt.secret=${AUTH_JWT_SECRET:connecthub-dev-secret-key-change-me-please-32bytes}

# ----- Server -----
server.port=8085

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ----- Presence Scheduler (seconds) -----
presence.stale.timeout-seconds=60
presence.ping.interval-seconds=30
