# ================================================================
# application.properties  —  notification-service
# ================================================================
spring.application.name=notification-service
spring.profiles.active=dev

# ----- Eureka Client -----
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ----- MySQL -----
spring.datasource.url=${NOTIF_DB_URL:jdbc:mysql://localhost:3306/connecthub_notification?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${NOTIF_DB_USERNAME:root}
spring.datasource.password=${NOTIF_DB_PASSWORD:P_22@LovePUBG}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# ----- JWT Secret (must match auth-service) -----
auth.jwt.secret=${AUTH_JWT_SECRET:connecthub-dev-secret-key-change-me-please-32bytes}

# ----- Server -----
server.port=8086

# ----- Email (Spring JavaMailSender) -----
# Set to true to enable real email sending; false uses console logging (dev mode)
notification.email.enabled=${NOTIF_EMAIL_ENABLED:false}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
notification.email.from=${NOTIF_EMAIL_FROM:noreply@connecthub.com}

# ----- Offline DM email threshold (minutes) -----
notification.email.offline-threshold-minutes=${NOTIF_EMAIL_OFFLINE_MINUTES:30}

# ----- FCM Push (set real key in prod) -----
# notification.fcm.enabled=false  (FCM disabled by default — no SDK dep needed)
notification.fcm.enabled=${NOTIF_FCM_ENABLED:false}
notification.fcm.server-key=${NOTIF_FCM_SERVER_KEY:your-fcm-server-key}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
