# ================================================================
# application.properties  —  media-service
# ================================================================
spring.application.name=media-service
spring.profiles.active=dev

# ----- Eureka Client -----
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ----- MySQL -----
spring.datasource.url=${MEDIA_DB_URL:jdbc:mysql://localhost:3306/connecthub_media?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MEDIA_DB_USERNAME:root}
spring.datasource.password=${MEDIA_DB_PASSWORD:P_22@LovePUBG}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# ----- File Upload -----
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=30MB

# ----- Media Config -----
media.upload.dir=uploads
media.base.url=http://localhost:8080
media.max.size.mb=25

# ----- Server -----
server.port=8084

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
