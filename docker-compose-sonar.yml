# ─────────────────────────────────────────────────────────────────────────────
# SonarQube + PostgreSQL — Local Development Setup
# Usage: docker-compose -f docker-compose-sonar.yml up -d
# Dashboard: http://localhost:9000  (admin / admin on first login)
# ─────────────────────────────────────────────────────────────────────────────

version: "3.8"

services:

  sonarqube:
    image: sonarqube:10.4-community
    container_name: connecthub-sonarqube
    depends_on:
      - sonar-db
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped

  sonar-db:
    image: postgres:15-alpine
    container_name: connecthub-sonar-db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonarqube
    volumes:
      - sonar_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonar_postgres_data:
